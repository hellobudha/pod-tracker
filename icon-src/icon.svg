<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fun, vibrant background -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13C58A"/>
      <stop offset="0.55" stop-color="#0E9E76"/>
      <stop offset="1" stop-color="#0B6B53"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Pod body gradient (warm, punchy) -->
    <linearGradient id="pod" x1="150" y1="210" x2="380" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A5B"/>
      <stop offset="0.5" stop-color="#FF5E7E"/>
      <stop offset="1" stop-color="#E23C66"/>
    </linearGradient>
    <linearGradient id="podShine" x1="180" y1="220" x2="260" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rim" x1="150" y1="300" x2="380" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9EDF2"/>
      <stop offset="0.5" stop-color="#B9C2CC"/>
      <stop offset="1" stop-color="#8A95A1"/>
    </linearGradient>
    <linearGradient id="crema" x1="206" y1="300" x2="306" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4D9A8"/>
      <stop offset="1" stop-color="#D9A86A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Steam -->
  <g stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="13" stroke-linecap="round" fill="none">
    <path d="M214 150 C 196 128, 232 112, 214 88"/>
    <path d="M256 138 C 238 116, 274 100, 256 76"/>
    <path d="M298 150 C 280 128, 316 112, 298 88"/>
  </g>

  <!-- Coffee pod (Vertuo dome) -->
  <g>
    <!-- soft shadow -->
    <ellipse cx="256" cy="406" rx="120" ry="20" fill="#000000" fill-opacity="0.18"/>
    <!-- dome body -->
    <path d="M150 318 C 150 230, 362 230, 362 318 L 362 322 C 362 332, 352 340, 340 340 L 172 340 C 160 340, 150 332, 150 322 Z" fill="url(#pod)"/>
    <!-- crema top inside dome -->
    <ellipse cx="256" cy="262" rx="78" ry="26" fill="url(#crema)"/>
    <ellipse cx="256" cy="259" rx="60" ry="17" fill="#FBEBC9" fill-opacity="0.7"/>
    <!-- shine -->
    <path d="M176 312 C 176 252, 256 240, 256 240 C 220 252, 206 286, 206 312 Z" fill="url(#podShine)"/>
    <!-- rim with ridges -->
    <rect x="150" y="338" width="212" height="34" rx="16" fill="url(#rim)"/>
    <g fill="#7E8893" fill-opacity="0.6">
      <rect x="168" y="346" width="6" height="18" rx="3"/>
      <rect x="190" y="346" width="6" height="18" rx="3"/>
      <rect x="212" y="346" width="6" height="18" rx="3"/>
      <rect x="234" y="346" width="6" height="18" rx="3"/>
      <rect x="256" y="346" width="6" height="18" rx="3"/>
      <rect x="278" y="346" width="6" height="18" rx="3"/>
      <rect x="300" y="346" width="6" height="18" rx="3"/>
      <rect x="322" y="346" width="6" height="18" rx="3"/>
      <rect x="338" y="346" width="6" height="18" rx="3"/>
    </g>
  </g>

  <!-- Tracking check badge -->
  <g>
    <circle cx="356" cy="360" r="46" fill="#FFFFFF"/>
    <circle cx="356" cy="360" r="46" fill="#10B981" fill-opacity="0.12"/>
    <path d="M336 360 l 14 15 l 26 -30" stroke="#10B981" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Sparkles for fun -->
  <g fill="#FFFFFF">
    <path d="M150 188 l 7 18 l 18 7 l -18 7 l -7 18 l -7 -18 l -18 -7 l 18 -7 Z" fill-opacity="0.95"/>
    <path d="M372 150 l 5 12 l 12 5 l -12 5 l -5 12 l -5 -12 l -12 -5 l 12 -5 Z" fill-opacity="0.85"/>
    <circle cx="126" cy="300" r="6" fill-opacity="0.7"/>
    <circle cx="400" cy="250" r="5" fill-opacity="0.6"/>
  </g>
</svg>
